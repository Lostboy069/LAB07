{% extends "base.html" %}
{% block title %}Login - Creative Studio{% endblock %}
{% block body_class %}class="auth-page"{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to your account to continue</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" required placeholder="Enter your username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="auth-divider"><span>OR</span></div>

                <div class="social-login">
                    <button type="button" class="btn-social"><i class="fab fa-google"></i> Google</button>
                    <button type="button" class="btn-social"><i class="fab fa-facebook"></i> Facebook</button>
                </div>

                <p class="auth-footer">
                    Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
                </p>
            </form>
        </div>
    </div>
</section>
{% endblock %}
